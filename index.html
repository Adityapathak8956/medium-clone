<!DOCTYPE html>
<html>
<head>
    <title>Medium Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <div id="home">

        <div class="navbar">
            <h1>Medium</h1>

            <button onclick="showSignup()">
                Get Started
            </button>
        </div>

        <div class="content">
            <h2>Human stories & ideas</h2>

            <p>
                A place to read, write and deepen your understanding.
            </p>

            <button onclick="showSignup()">
                Start Reading
            </button>
        </div>

    </div>

    
    <div id="signup">

        <h2>Join Medium</h2>

        <button class="option">Sign up with Google</button>

        <button class="option">Sign up with Facebook</button>

        <button class="option">Sign up with Email</button>

        <p>
            Already have an account?
            <a href="#">Sign In</a>
        </p>

    </div>

    <script src="script.js"></script>

</body>
</html>
